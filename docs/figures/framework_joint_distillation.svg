<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720"
  font-family="'Helvetica Neue', Arial, Helvetica, sans-serif">

  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="teacherGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff"/>
      <stop offset="100%" style="stop-color:#bee3f8"/>
    </linearGradient>
    <linearGradient id="cnnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#faf5ff"/>
      <stop offset="100%" style="stop-color:#e9d8fd"/>
    </linearGradient>
    <linearGradient id="lrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fffaf0"/>
      <stop offset="100%" style="stop-color:#feebc8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlack" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#2d3748"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#3182ce"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#dd6b20"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="50" fill="url(#headerGrad)"/>
  <text x="500" y="32" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">
    Dual-Student Joint Distillation
  </text>

  <!-- Input Box -->
  <g filter="url(#shadow)">
    <rect x="400" y="70" width="200" height="70" rx="8" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
  </g>
  <text x="500" y="98" text-anchor="middle" fill="#2d3748" font-size="13" font-weight="600">Input: X (Packet Sequence)</text>
  <text x="500" y="118" text-anchor="middle" fill="#718096" font-size="11">
    <tspan font-style="italic">X</tspan> &#x2208; &#x211D;<tspan baseline-shift="sub" font-size="9">(batch, seq_len, n_feat)</tspan>
  </text>

  <!-- Arrow: Input to Teacher -->
  <path d="M500 140 L500 175" stroke="#2d3748" stroke-width="2" marker-end="url(#arrowBlack)"/>
  <text x="520" y="160" fill="#718096" font-size="10">data</text>

  <!-- Arrow: Input to CNN -->
  <path d="M500 105 Q620 90 700 145" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <text x="610" y="92" fill="#718096" font-size="9">raw data</text>

  <!-- Teacher Box -->
  <g filter="url(#shadow)">
    <rect x="350" y="180" width="300" height="150" rx="10" fill="url(#teacherGrad)" stroke="#3182ce" stroke-width="2"/>
  </g>
  <text x="500" y="210" text-anchor="middle" fill="#1a365d" font-size="14" font-weight="700">Teacher (Transformer)</text>

  <rect x="380" y="225" width="240" height="40" rx="6" fill="#ffffff" stroke="#90cdf4" stroke-width="1.5"/>
  <text x="500" y="245" text-anchor="middle" fill="#2b6cb0" font-size="11">Embed + L Transformer Blocks</text>
  <text x="500" y="260" text-anchor="middle" fill="#4299e1" font-size="10">Multi-Head Self-Attention + FFN</text>

  <rect x="400" y="280" width="200" height="35" rx="5" fill="#ffffff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="500" y="300" text-anchor="middle" fill="#1a365d" font-size="11" font-weight="600">
    Output: <tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">T</tspan> (logits)
  </text>

  <!-- CNN Student Box -->
  <g filter="url(#shadow)">
    <rect x="700" y="180" width="240" height="150" rx="10" fill="url(#cnnGrad)" stroke="#805ad5" stroke-width="2"/>
  </g>
  <text x="820" y="210" text-anchor="middle" fill="#553c9a" font-size="14" font-weight="700">CNN Student</text>

  <rect x="720" y="225" width="200" height="40" rx="6" fill="#ffffff" stroke="#d6bcfa" stroke-width="1.5"/>
  <text x="820" y="245" text-anchor="middle" fill="#6b46c1" font-size="11">Conv1d&#x00D7;3 + FC Layer</text>
  <text x="820" y="260" text-anchor="middle" fill="#805ad5" font-size="10">BN, ReLU, Pooling</text>

  <rect x="740" y="280" width="160" height="35" rx="5" fill="#ffffff" stroke="#805ad5" stroke-width="1.5"/>
  <text x="820" y="300" text-anchor="middle" fill="#553c9a" font-size="11" font-weight="600">
    Output: <tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">C</tspan> (logits)
  </text>

  <!-- Teacher to CNN KD Arrow -->
  <path d="M650 230 Q680 180 700 220" stroke="#3182ce" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="660" y="195" fill="#3182ce" font-size="9" font-weight="500">Soft Target</text>

  <!-- KD Loss Box -->
  <g filter="url(#shadow)">
    <rect x="420" y="360" width="400" height="100" rx="10" fill="#f0fff4" stroke="#48bb78" stroke-width="2"/>
  </g>
  <text x="620" y="390" text-anchor="middle" fill="#22543d" font-size="13" font-weight="700">Standard KD Loss</text>

  <text x="620" y="420" text-anchor="middle" fill="#276749" font-size="11" font-style="italic">
    L = <tspan font-weight="600">&#x03B1;</tspan> &#x00B7; <tspan font-style="italic">&#x03C4;</tspan>&#x00B2; &#x00D7; D<tspan font-size="8" baseline-shift="sub">KL</tspan>(
  </text>
  <text x="620" y="438" text-anchor="middle" fill="#276749" font-size="11" font-style="italic">
    log_softmax(<tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">C</tspan>/<tspan font-style="italic">&#x03C4;</tspan>) &#x2016; softmax(<tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">T</tspan>/<tspan font-style="italic">&#x03C4;</tspan>))
  </text>
  <text x="620" y="450" text-anchor="middle" fill="#276749" font-size="10">
    + (1-<tspan font-weight="600">&#x03B1;</tspan>) &#x00B7; CE(<tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">C</tspan>, <tspan font-style="italic">y</tspan>)
  </text>

  <!-- Teacher to KD Box -->
  <path d="M500 330 L500 358" stroke="#3182ce" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="510" y="345" fill="#3182ce" font-size="9">
    <tspan font-style="italic">p</tspan><tspan font-size="7" baseline-shift="sub">T</tspan> = softmax(<tspan font-style="italic">z</tspan><tspan font-size="7" baseline-shift="sub">T</tspan>/<tspan font-style="italic">&#x03C4;</tspan>)
  </text>

  <!-- CNN to KD Box -->
  <path d="M820 330 L820 358" stroke="#805ad5" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="830" y="345" fill="#805ad5" font-size="9">
    <tspan font-style="italic">z</tspan><tspan font-size="7" baseline-shift="sub">C</tspan>
  </text>

  <!-- Co-Distillation LR Box -->
  <g filter="url(#shadow)">
    <rect x="300" y="490" width="400" height="120" rx="10" fill="url(#lrGrad)" stroke="#dd6b20" stroke-width="2"/>
  </g>
  <text x="500" y="525" text-anchor="middle" fill="#9c4221" font-size="14" font-weight="700">Co-Distillation LR (LR_co_distill)</text>

  <rect x="330" y="540" width="340" height="55" rx="6" fill="#ffffff" stroke="#f6ad55" stroke-width="1.5"/>
  <text x="500" y="562" text-anchor="middle" fill="#744210" font-size="11" font-weight="600">
    Input: concat(<tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">T</tspan>, <tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">C</tspan>)
  </text>
  <text x="500" y="582" text-anchor="middle" fill="#975a16" font-size="10">
    [Teacher logits; CNN logits] &#x2192; Logistic Regression &#x2192; &#x177;
  </text>

  <!-- Teacher to LR -->
  <path d="M500 330 Q450 380 350 490" stroke="#dd6b20" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="350" y="410" fill="#dd6b20" font-size="9">
    <tspan font-style="italic">z</tspan><tspan font-size="7" baseline-shift="sub">T</tspan>
  </text>

  <!-- CNN to LR -->
  <path d="M820 330 Q780 400 620 490" stroke="#dd6b20" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="730" y="410" fill="#dd6b20" font-size="9">
    <tspan font-style="italic">z</tspan><tspan font-size="7" baseline-shift="sub">C</tspan>
  </text>

  <!-- Evaluation Box -->
  <g filter="url(#shadow)">
    <rect x="750" y="490" width="180" height="120" rx="10" fill="#fff5f5" stroke="#fc8181" stroke-width="2"/>
  </g>
  <text x="840" y="525" text-anchor="middle" fill="#742a2a" font-size="13" font-weight="700">Evaluation</text>

  <text x="840" y="555" text-anchor="middle" fill="#c53030" font-size="11">&#x2022; Accuracy</text>
  <text x="840" y="575" text-anchor="middle" fill="#c53030" font-size="11">&#x2022; Latency</text>
  <text x="840" y="595" text-anchor="middle" fill="#c53030" font-size="11">&#x2022; Model Size</text>

  <!-- LR to Evaluation -->
  <path d="M700 550 L748 550" stroke="#c53030" stroke-width="1.5" fill="none" marker-end="url(#arrowBlack)"/>

  <!-- Legend -->
  <g transform="translate(30, 600)">
    <text x="0" y="0" fill="#2d3748" font-size="11" font-weight="600">Legend</text>

    <line x1="0" y1="20" x2="30" y2="20" stroke="#2d3748" stroke-width="2"/>
    <text x="40" y="24" fill="#718096" font-size="10">Data Flow</text>

    <line x1="0" y1="40" x2="30" y2="40" stroke="#3182ce" stroke-width="2"/>
    <text x="40" y="44" fill="#718096" font-size="10">Distillation Signal</text>

    <line x1="0" y1="60" x2="30" y2="60" stroke="#dd6b20" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="40" y="64" fill="#718096" font-size="10">Co-Distillation</text>
  </g>

  <!-- Symbol Explanation -->
  <g transform="translate(30, 140)">
    <text x="0" y="0" fill="#2d3748" font-size="11" font-weight="600">Symbols</text>
    <text x="0" y="20" fill="#718096" font-size="10">
      <tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">T</tspan>: Teacher logits
    </text>
    <text x="0" y="36" fill="#718096" font-size="10">
      <tspan font-style="italic">z</tspan><tspan font-size="8" baseline-shift="sub">C</tspan>: CNN logits
    </text>
    <text x="0" y="52" fill="#718096" font-size="10">
      <tspan font-style="italic">&#x03C4;</tspan>: Temperature (default 2.0)
    </text>
    <text x="0" y="68" fill="#718096" font-size="10">
      <tspan font-weight="600">&#x03B1;</tspan>: KD loss weight
    </text>
    <text x="0" y="84" fill="#718096" font-size="10">
      <tspan font-style="italic">y</tspan>: Ground truth label
    </text>
  </g>

  <!-- Box Descriptions -->
  <g transform="translate(750, 140)">
    <text x="0" y="0" fill="#2d3748" font-size="11" font-weight="600">Box Contents</text>
    <text x="0" y="20" fill="#3182ce" font-size="10">Teacher:</text>
    <text x="0" y="34" fill="#718096" font-size="9">Transformer processes</text>
    <text x="0" y="46" fill="#718096" font-size="9">packet sequence X</text>

    <text x="0" y="70" fill="#805ad5" font-size="10">CNN:</text>
    <text x="0" y="84" fill="#718096" font-size="9">Lightweight student</text>
    <text x="0" y="96" fill="#718096" font-size="9">with 1D convolutions</text>

    <text x="0" y="120" fill="#dd6b20" font-size="10">LR_co_distill:</text>
    <text x="0" y="134" fill="#718096" font-size="9">Receives both Teacher</text>
    <text x="0" y="146" fill="#718096" font-size="9">and CNN logits</text>
  </g>

</svg>
